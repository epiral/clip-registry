<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clip Registry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="container">
        <header class="newspaper-header">
            <h1>Clip Registry</h1>
            <div class="date-line" id="current-date">Sunday, March 1, 2026</div>
        </header>

        <main>
            <section id="bridge-warning" class="hidden">
                <div class="error-box">
                    <p>Please open in Clip Dock to access full functionality.</p>
                </div>
            </section>

            <section id="server-management" class="section">
                <h2>Server Management</h2>
                <div class="grid-container">
                    <div class="form-card">
                        <h3>Add New Server</h3>
                        <form id="add-server-form">
                            <div class="form-group">
                                <label for="server-name">Name</label>
                                <input type="text" id="server-name" required placeholder="home">
                            </div>
                            <div class="form-group">
                                <label for="server-url">URL</label>
                                <input type="url" id="server-url" required placeholder="http://localhost:8080">
                            </div>
                            <div class="form-group">
                                <label for="server-token">Token</label>
                                <input type="password" id="server-token" required>
                            </div>
                            <button type="submit" class="btn">Add Server</button>
                        </form>
                    </div>
                    <div class="list-card">
                        <h3>Configured Servers</h3>
                        <div id="servers-list" class="servers-list">
                            <p class="empty-state">Loading servers...</p>
                        </div>
                    </div>
                </div>
            </section>

            <hr class="divider">

            <section id="clip-browser" class="section">
                <h2>Clip Browser</h2>
                <div id="clips-grid" class="clips-grid">
                    <p class="empty-state">Loading clips...</p>
                </div>
            </section>
        </main>

        <footer class="newspaper-footer">
            <p>&copy; 2026 Clip Registry Editorial</p>
        </footer>

        <div id="notification-toast" class="toast hidden">
            <span id="toast-message"></span>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
